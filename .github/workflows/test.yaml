name: Test MergeBlocker

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test imports and basic functionality
        run: |
          python -c "
          import sys
          sys.path.append('.')

          # Test основных импортов
          try:
              from src.config import Config
              from src.handlers.webhook_handler import WebhookHandler
              from src.clients.github_client import GitHubClient
              from src.analysis.code_analyzer import CodeAnalyzer
              print('✅ Основные импорты успешны')
          except Exception as e:
              print(f'❌ Ошибка импорта основных модулей: {e}')
              sys.exit(1)

          # Test Flask app
          try:
              import app
              print('✅ Flask приложение создано успешно')
          except Exception as e:
              print(f'❌ Ошибка создания Flask app: {e}')
              sys.exit(1)
          "

      - name: Run unit tests
        run: |
          # Запускаем unit тесты (без LLM интеграции)
          pytest tests/test_webhook_handler.py -v --tb=short

      - name: Run integration tests (optional)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE_URL: ${{ secrets.LLM_API_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          # Интеграционные тесты пропускаются если LLM_API_KEY не установлен
          pytest tests/test_llm_integration.py -v --tb=short || echo "⚠️ LLM тесты пропущены (API key не настроен)"

      - name: Run all tests with coverage
        run: |
          pytest --cov=src --cov-report=term --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t mergeblocker-test .

      - name: Test Docker container
        run: |
          # Запускаем контейнер в фоне
          docker run -d --name mergeblocker-test-container \
            -p 8002:8002 \
            -e GITHUB_APP_ID="12345" \
            -e GITHUB_PRIVATE_KEY_PATH="/tmp/dummy-key.pem" \
            -e GITHUB_WEBHOOK_SECRET="test-secret" \
            -e LLM_API_KEY="test-key" \
            mergeblocker-test \
            sh -c "echo 'dummy-key' > /tmp/dummy-key.pem && python app.py" &

          # Ждем запуска
          sleep 10

          # Проверяем доступность API
          if curl -f http://localhost:8002/ > /dev/null 2>&1; then
            echo "✅ API отвечает"
          else
            echo "❌ API не отвечает"
            docker logs mergeblocker-test-container || true
            exit 1
          fi

          # Останавливаем контейнер
          docker stop mergeblocker-test-container || true
          docker rm mergeblocker-test-container || true

