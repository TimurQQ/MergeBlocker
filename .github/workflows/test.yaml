name: Test MergeBlocker

on:
  workflow_call:
    secrets:
      LLM_API_KEY:
        required: false
      LLM_API_BASE_URL:
        required: false
      LLM_MODEL:
        required: false
      APP_ID:
        required: false
      WEBHOOK_SECRET:
        required: false
      PRIVATE_KEY_BASE64:
        required: false

jobs:
  validate-credentials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache Poetry installation
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: poetry-${{ runner.os }}-2.2.1  # Версия Poetry из установщика

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: poetry-deps-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            poetry-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry install --no-root

      - name: Create .env file
        run: |
          cat > .env << EOF
          GITHUB_APP_ID=${{ secrets.APP_ID }}
          GITHUB_WEBHOOK_SECRET=${{ secrets.WEBHOOK_SECRET }}
          GITHUB_PRIVATE_KEY_PATH=./private-key.pem
          EOF

      - name: Create private key file
        run: |
          echo "${{ secrets.PRIVATE_KEY_BASE64 }}" | base64 -d > private-key.pem
          chmod 600 private-key.pem

      - name: Validate GitHub App credentials
        run: |
          # Проверяем наличие обязательных секретов
          if [ -z "${{ secrets.APP_ID }}" ]; then
            echo "❌ APP_ID secret is not configured!"
            echo "   Configure it in: Settings → Secrets and variables → Actions"
            exit 1
          fi

          if [ -z "${{ secrets.WEBHOOK_SECRET }}" ]; then
            echo "❌ WEBHOOK_SECRET secret is not configured!"
            exit 1
          fi

          if [ -z "${{ secrets.PRIVATE_KEY_BASE64 }}" ]; then
            echo "❌ PRIVATE_KEY_BASE64 secret is not configured!"
            exit 1
          fi

          # Запускаем валидацию через poetry
          poetry run python src/scripts/validate_credentials.py

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f .env private-key.pem

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache Poetry installation
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: poetry-${{ runner.os }}-2.2.1  # Версия Poetry из установщика

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: poetry-deps-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            poetry-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry install --no-root

      - name: Lint with flake8
        run: |
          set -e  # Прервать выполнение при любой ошибке
          # Останавливаем сборку если есть синтаксические ошибки или неопределенные имена
          poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Проверяем весь остальной код (длина строк, сложность и т.д.)
          # Сборка упадет если найдены проблемы
          poetry run flake8 . --count --max-complexity=11 --max-line-length=127 --statistics

      - name: Check code formatting with black
        run: |
          set -e  # Прервать выполнение при любой ошибке
          poetry run black --check --diff .

      - name: Check import sorting with isort
        run: |
          set -e  # Прервать выполнение при любой ошибке
          poetry run isort --check-only --diff .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache Poetry installation
        uses: actions/cache@v3
        with:
          path: ~/.local
          key: poetry-${{ runner.os }}-2.2.1  # Версия Poetry из установщика

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: poetry-deps-${{ runner.os }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            poetry-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          poetry install --no-root

      - name: Create dummy private key for testing
        run: |
          # Создаем dummy private key для тестов (не используется в реальности)
          ssh-keygen -t rsa -b 4096 -f private-key.pem -N "" -C "test-key"

      - name: Test imports and basic functionality
        env:
          GITHUB_APP_ID: "12345"
          GITHUB_WEBHOOK_SECRET: "test-secret"
          LLM_API_KEY: "test-key"
        run: |
          poetry run python -c "
          import sys
          sys.path.append('.')

          # Test основных импортов
          try:
              from src.config import Config
              from src.handlers.webhook_handler import WebhookHandler
              from src.clients.github_client import GitHubClient
              from src.analysis.code_analyzer import CodeAnalyzer
              print('✅ Основные импорты успешны')
          except Exception as e:
              print(f'❌ Ошибка импорта основных модулей: {e}')
              sys.exit(1)

          # Test Flask app
          try:
              import app
              print('✅ Flask приложение создано успешно')
          except Exception as e:
              print(f'❌ Ошибка создания Flask app: {e}')
              sys.exit(1)
          "

      - name: Run all tests with coverage
        env:
          GITHUB_APP_ID: "12345"
          GITHUB_WEBHOOK_SECRET: "test-secret"
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE_URL: ${{ secrets.LLM_API_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          # Параллельный запуск с 8 воркерами (динамическое распределение тестов)
          poetry run pytest -n 8 --cov=src --cov-report=term --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true  # Загружаем образ в локальный Docker (для тестов)
          tags: mergeblocker-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker container
        run: |
          # Запускаем контейнер в фоне
          docker run -d --name mergeblocker-test-container \
            -p 8002:8002 \
            -e GITHUB_APP_ID="12345" \
            -e GITHUB_PRIVATE_KEY_PATH="/tmp/dummy-key.pem" \
            -e GITHUB_WEBHOOK_SECRET="test-secret" \
            -e LLM_API_KEY="test-key" \
            mergeblocker-test \
            sh -c "echo 'dummy-key' > /tmp/dummy-key.pem && python app.py" &

          # Ждем запуска с умной проверкой (max 30s)
          echo "⏳ Waiting for API to start..."
          SECONDS=0
          until curl -sf http://localhost:8002/ > /dev/null 2>&1; do
            if [ $SECONDS -ge 30 ]; then
              echo "❌ API не отвечает (timeout 30s)"
            docker logs mergeblocker-test-container || true
            exit 1
          fi
            echo -n "."
            sleep 1
          done

          echo ""
          echo "✅ API отвечает за $SECONDS секунд"

          # Останавливаем контейнер
          docker stop mergeblocker-test-container || true
          docker rm mergeblocker-test-container || true
